<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingatlan</title>
</head>

<body>


  <div class="container">
    <button id="aboutButton" class="btn btn-primary mt-3">Névjegy</button>

    <h1>Ingatlan</h1>

  <!-- Button trigger modal -->
  <button type="button" class="btn btn-primary my-3" 
  data-bs-toggle="modal" data-bs-target="#exampleModal">
    Hozzáadás...
  </button>    

    <table class="table table-striped table-dark">
      <thead>
        <tr>
          <th>Id</th>
          <th>Típus (eladó/kiadó)</th>
          <th>Ár (LTC)</th>
          <th>Település</th>
          <th>Alapterület (m²)</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>


  </div>




  <!-- Modal -->
  <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          


          <form id="propertyForm">
            <div>
              <label for="id" class="form-label">Id</label>
              <input type="text" id="id" name="id"
              class="form-control" readonly>
            </div>
            <div>
              <label for="type" class="form-label">Típus (eladó/kiadó)</label>
              <input type="text" id="type" name="type"
              class="form-control">
            </div>
            <div>
              <label for="price" class="form-label">Ár (LTC)</label>
              <input type="text" id="price" name="price"
              class="form-control">
            </div>
            <div>
              <label for="city" class="form-label">Település</label>
              <input type="text" id="city" name="city"
              class="form-control">
            </div>
            <div>
              <label for="basaArea" class="form-label">Alapterület (m²)</label>
              <input type="text" id="baseArea" name="baseArea"
              class="form-control">
            </div>            
          </form>



        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" 
          data-bs-dismiss="modal"
          id="closeButton">Bezárás</button>

          <button type="submit" class="btn btn-primary"
          data-bs-dismiss="modal"
          form="propertyForm">Mentés</button>
        </div>
      </div>
    </div>
  </div>


  <script type="module" src="src/app.js"></script>
</body>

</html>
